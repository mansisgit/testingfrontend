<div th:fragment="content">
    <!-- Post Creation Card -->
    <div class="card" style="padding: 1.5rem; margin-bottom: 2.5rem; border-left: 4px solid var(--primary);">
        <div class="flex gap-4">
            <div class="avatar"></div>
            <form th:action="@{/post/create}" method="post" style="flex: 1;">
                <textarea name="content" class="input" placeholder="What's happening in your socials?" 
                          style="min-height: 100px; resize: none; margin-bottom: 1rem; border: none; background: #f8fafc; padding: 1rem;" required></textarea>
                <div class="flex justify-between align-center">
                    <div class="flex gap-2 text-muted" style="font-size: 0.875rem;">
                        <!-- Labels removed as per request -->
                    </div>
                    <button type="submit" class="btn">Share Post</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Feed Header -->
    <div style="margin-bottom: 2rem;">
        <h1 style="font-size: 1.8rem; font-weight: 800; color: var(--text);">Your Universe</h1>
        <p class="text-muted" style="font-size: 0.9rem;">The latest updates from your network.</p>
    </div>

    <!-- Success Feedback -->
    <script th:if="${param.posted != null}">
        setTimeout(() => {
            const url = new URL(window.location);
            url.searchParams.delete('posted');
            window.history.replaceState({}, '', url);
        }, 3000);
    </script>

    <!-- Post List -->
    <div class="post-list">
        <div th:each="post : ${posts}" class="card" style="padding: 1.5rem; margin-bottom: 1.5rem;">
            <!-- Post Header -->
            <div class="flex justify-between align-center" style="margin-bottom: 1rem;">
                <div class="flex align-center gap-3">
                    <div class="avatar avatar-sm"></div>
                    <div class="flex-column">
                        <a th:href="@{'/profile/' + ${post.user.userID}}" class="username" th:text="${post.user != null ? post.user.username : 'Unknown User'}">User</a>
                        <span class="timestamp" th:text="${#temporals.format(post.timestamp, 'MMM dd, yyyy HH:mm')}">Time</span>
                    </div>
                </div>
                <button class="action-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg>
                </button>
            </div>

            <!-- Post Content -->
            <div style="margin-bottom: 1.5rem; font-size: 1.05rem; color: #334155; line-height: 1.6;">
                <p th:text="${post.content}">Post content goes here...</p>
            </div>

            <!-- Post Actions -->
            <div class="flex align-center gap-4" style="border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 0.75rem 0; margin-bottom: 1rem;">
                <form th:action="@{'/post/' + ${post.postID} + '/like'}" method="post">
                    <button type="submit" class="action-btn" th:classappend="${userLiked.get(post.postID) ? 'text-danger' : ''}">
                        <svg width="20" height="20" viewBox="0 0 24 24" th:fill="${userLiked.get(post.postID) ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                        <span class="like-count" th:text="${likeCounts.get(post.postID)}">0</span>
                    </button>
                </form>
                <div class="action-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                    <span class="comment-count" th:text="${postComments.get(post.postID).size()}">0</span>
                </div>
            </div>

            <!-- Comments Section -->
            <div class="comments-area" style="background: #f8fafc; border-radius: var(--radius-sm); padding: 1rem;">
                <div th:each="comment : ${postComments.get(post.postID)}" style="margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8f0;">
                    <div class="flex gap-2">
                        <span class="username" style="font-size: 0.85rem;" th:text="${comment.user != null ? comment.user.username : 'User'}">User</span>
                        <span class="timestamp" style="font-size: 0.75rem;" th:text="${#temporals.format(comment.timestamp, 'HH:mm')}">Time</span>
                    </div>
                    <p style="font-size: 0.9rem; margin-top: 0.25rem;" th:text="${comment.commentText}">Comment text...</p>
                </div>

                <!-- Add Comment Form -->
                <form th:action="@{'/post/' + ${post.postID} + '/comment'}" method="post" class="flex gap-2" style="margin-top: 1rem;">
                    <input type="text" name="content" class="input" placeholder="Add a comment..." style="font-size: 0.85rem; padding: 0.5rem 1rem;">
                    <button type="submit" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Post</button>
                </form>
            </div>
        </div>
    </div>
</div>
