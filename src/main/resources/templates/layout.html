<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title + ' | Socials' : 'Socials'}">Socials</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" th:if="${currentUser != null}">
            <div class="nav-brand">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 12l10 5 10-5M2 17l10 5 10-5"></path>
                </svg>
                Socials
            </div>
            
            <ul class="nav-links">
                <li class="nav-item">
                    <a href="/homepage" class="nav-link" th:classappend="${activePage == 'feed' ? 'active' : ''}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                        Feed
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/inbox" class="nav-link" th:classappend="${activePage == 'inbox' ? 'active' : ''}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        Messages
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/notifications" class="nav-link" th:classappend="${activePage == 'notifications' ? 'active' : ''}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        Notifications
                        <span class="badge" th:if="${notificationCount > 0}" th:text="${notificationCount}" style="margin-left: auto;">0</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/network" class="nav-link" th:classappend="${activePage == 'network' ? 'active' : ''}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        Network
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/groups" class="nav-link" th:classappend="${activePage == 'groups' ? 'active' : ''}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                        Groups
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{'/profile/' + ${currentUser.userID}}" class="nav-link" th:classappend="${activePage == 'profile' ? 'active' : ''}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        Profile
                    </a>
                </li>
            </ul>

            <div style="margin-top: auto; border-top: 1px solid var(--border); padding-top: 1rem;">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="nav-link" style="width: 100%; border: none; background: none; cursor: pointer; color: var(--danger)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        Logout
                    </button>
                </form>
            </div>
        </aside>

        <!-- Top Header -->
        <header class="top-header" th:if="${currentUser != null}">
            <form th:action="@{/search}" method="get" class="search-box">
                <svg style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" name="q" th:value="${query}" placeholder="Search for people, posts, or IDs...">
            </form>
            
            <div class="flex align-center gap-4">
                <div class="flex-column" style="text-align: right;">
                    <span class="username" style="font-size: 0.9rem;" th:text="${currentUser.username}">User</span>
                </div>
                <div class="avatar"></div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main th:class="${currentUser != null ? 'main-content' : 'auth-container'}">
            <div th:replace="__${content}__"></div>
        </main>
    </div>
    <script th:src="@{/js/interactions.js}"></script>
</body>

</html>
