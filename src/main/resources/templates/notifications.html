<div th:fragment="content">
    <div style="margin-bottom: 2.5rem; display: flex; justify-content: space-between; align-items: flex-end;">
        <div class="flex-column">
            <h1 style="font-size: 1.8rem; font-weight: 800; color: var(--text);">Notifications</h1>
            <p class="text-muted" style="font-size: 0.9rem;">Keep track of your latest interactions across the socials.</p>
        </div>
    </div>

    <!-- Notifications List -->
    <div th:if="${notifications.isEmpty()}" class="card" style="padding: 4rem; text-align: center;">
        <div style="width: 64px; height: 64px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        </div>
        <h3 style="font-weight: 800; color: var(--text);">Clear Skies</h3>
        <p class="text-muted">No new notifications at the moment.</p>
    </div>

    <div class="notifications-list flex-column gap-3">
        <div th:each="notification : ${notifications}" class="card" style="padding: 1.25rem; transition: transform 0.2s;">
            <div class="flex align-center justify-between">
                <div class="flex align-center gap-4">
                    <div style="width: 48px; height: 48px; background: rgba(99, 102, 241, 0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--primary);">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    </div>
                    <div class="flex-column">
                        <p style="font-weight: 600; color: var(--text); margin-bottom: 0.25rem;" th:text="${notification.content}">Notification content</p>
                        <span class="timestamp" th:text="${#temporals.format(notification.timestamp, 'MMM dd, HH:mm')}">Time</span>
                    </div>
                </div>
                <form th:action="@{'/notification/delete/' + ${notification.notificationID}}" method="post">
                    <button type="submit" class="action-btn" title="Dismiss">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
