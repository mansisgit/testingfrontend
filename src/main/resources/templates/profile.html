<div th:fragment="content">
    <!-- Profile Header -->
    <div class="card" style="margin-bottom: 2.5rem; overflow: hidden;">
        <!-- Banner Container -->
        <div style="height: 200px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); position: relative;">
            <div style="position: absolute; bottom: -50px; left: 40px;">
                <div class="avatar avatar-lg" style="width: 120px; height: 120px; border: 5px solid white; box-shadow: var(--shadow-lg);"></div>
            </div>
        </div>
        
        <!-- Profile Info Area -->
        <div style="padding: 60px 40px 30px; display: flex; justify-content: space-between; align-items: flex-end;">
            <div class="flex-column">
                <h1 style="font-size: 2rem; font-weight: 800; color: var(--text); letter-spacing: -1px;" th:text="${user.username}">Username</h1>
                <p class="text-muted" th:text="${user.email}">user@example.com</p>
                
                <div class="flex gap-4" style="margin-top: 1.5rem;">
                    <div class="flex-column">
                        <span style="font-size: 1.25rem; font-weight: 800; color: var(--text);" th:text="${posts.size()}">0</span>
                        <span class="text-muted" style="font-size: 0.75rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">Posts</span>
                    </div>
                    <div class="flex-column">
                        <span style="font-size: 1.25rem; font-weight: 800; color: var(--text);" th:text="${friendCount}">0</span>
                        <span class="text-muted" style="font-size: 0.75rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">Friends</span>
                    </div>
                </div>
            </div>

            <div class="flex gap-2">
                <form th:if="${currentUser.userID != user.userID}" th:action="@{'/friendship/request/' + ${user.userID}}" method="post">
                    <button type="submit" class="btn">Connect</button>
                </form>
                <a th:if="${currentUser.userID == user.userID}" href="/profile/edit" class="btn">Edit Profile</a>
            </div>
        </div>
    </div>

    <!-- Profile Navigation Content -->
    <div style="display: block; max-width: 800px;">
        <!-- Post Timeline -->
        <div class="flex-column">
            <h3 style="margin-bottom: 1.5rem; font-weight: 800; color: var(--text);">Published in Socials</h3>
            
            <div th:each="post : ${posts}" class="card" style="padding: 1.5rem; margin-bottom: 1.5rem;">
                <!-- Post Content -->
                <div class="flex justify-between" style="margin-bottom: 1rem;">
                    <span class="timestamp" th:text="${#temporals.format(post.timestamp, 'MMM dd, yyyy')}">Date</span>
                    <button class="action-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg></button>
                </div>
                <p style="font-size: 1.05rem; line-height: 1.6; color: #334155; margin-bottom: 1.5rem;" th:text="${post.content}">Post content...</p>
                
                <!-- Interaction Bar -->
                <div class="flex gap-4" style="border-top: 1px solid var(--border); padding-top: 1rem;">
                    <div class="flex align-center gap-1 text-muted" style="font-size: 0.9rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                        <span th:text="${likeCounts.get(post.postID)}">0</span>
                    </div>
                    <div class="flex align-center gap-1 text-muted" style="font-size: 0.9rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                        <span th:text="${postComments.get(post.postID).size()}">0</span>
                    </div>
                </div>
            </div>

            </div>
        </div>
    </div>
</div>
